# ==========================================
# CONFIGURACIÓN DE LA BASE DE DATOS (MySQL)
# ==========================================

# URL de conexión: localhost, puerto 3306, base de datos "almacen_db"
spring.datasource.url=jdbc:mysql://localhost:3306/almacen_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Credenciales de acceso a MySQL (cambiar según tu configuración local)
spring.datasource.username=root
spring.datasource.password=1234

# Driver de MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ==========================================

# "update" crea/modifica las tablas automáticamente según las entidades
# Opciones: none | validate | update | create | create-drop
spring.jpa.hibernate.ddl-auto=update

# Muestra las queries SQL en la consola (útil para aprender)
spring.jpa.show-sql=true

# Formatea las queries SQL para que sean más legibles
spring.jpa.properties.hibernate.format_sql=true

# Dialecto de MySQL 8
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# CONFIGURACIÓN DEL SERVIDOR
# ==========================================

# Puerto del servidor (por defecto 8080)
server.port=8080
